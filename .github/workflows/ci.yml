name: CI

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - 'v*'

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/llm-to-apps/money-template

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_DATABASE: money
          MYSQL_PASSWORD: password
          MYSQL_ROOT_PASSWORD: root-password
          MYSQL_USER: user
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -u root -proot-password"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run prisma:generate
        env:
          DATABASE_URL: mysql://user:password@localhost:3306/money

      - name: Validate Prisma schema
        run: npm run prisma:validate
        env:
          DATABASE_URL: mysql://user:password@localhost:3306/money

      - name: Apply MySQL migrations
        run: npm run db:deploy
        env:
          DATABASE_URL: mysql://user:password@127.0.0.1:3306/money

      - name: Check formatting
        run: npm run format:check

      - name: Dependency audit
        run: npm run audit:check

      - name: Unit tests
        run: npm run test

      - name: Coverage
        run: npm run test:coverage

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build
        env:
          DATABASE_URL: mysql://user:password@localhost:3306/money

      - name: Install Playwright
        run: npx playwright install --with-deps chromium

      - name: Critical flow tests
        run: npm run test:e2e
        env:
          DATABASE_URL: mysql://user:password@localhost:3306/money
          MONEY_AUTH_MODE: local

      - name: SQLite real database e2e
        run: npm run test:e2e:sqlite

  docker:
    name: Docker
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=sha-

      - name: Login to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
          sbom: false
